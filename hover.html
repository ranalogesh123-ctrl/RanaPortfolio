<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
        }
        body{
            display: flex;
            justify-content: center;
            height: 100vh;
            align-items: center;
            gap: 2px;
        }

        .box{
            height: 200px;
            width: 100px;
            background-color: rgb(241, 245, 245);
            transform: skew(-10deg);
            border-radius: 10%;
        }
        .box:hover{
            background-color: aquamarine;
        }
        .box:not(:hover){
            transition: all ease-in-out 600ms;
        }
    </style>
</head>
<body>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>

</body>
</html>
