<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        * {
            margin: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
            gap: 10px;
        }

        button {
            padding: 5px 10px;
            border-radius: 10px;
            color: rgb(29, 17, 125);
        }

        .submit-button {
            background: yellow;
            font-weight: 800;
        }

        .cancel-button {
            background-color: greenyellow;
            border: 2px solid;
        }
    </style>
</head>

<body>
    <button class="submit-button">submit</button>
    <button class="cancel-button">cancel</button>
</body>

</html>
