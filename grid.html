<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    body {
      justify-content: center;
      height: 100vh;
      display: flex;
    }
    .child {
      background-color: aqua;
      border-radius: 20%;
      
    }
    .parent {
      display: grid;
      grid-template-columns: repeat(3, 33%);
      gap: calc(2px);
      width: 500px;
      height: 200px;
      border-radius: 10px;
    }
    .row-span2 {
      grid-row: span 2/ span 2;
    }
    .col-span3 {
      grid-column: span 2/ span 2;
    }
    .row-span3 {
      grid-column: span 2/ span 2;
    }
  </style>
  <body>
    <div class="parent">
      <div class="child">1</div>
      <div class="child row-span2">2</div>
      <div class="child">3</div>
      <div class="child row-span2">4</div>
      <div class="child">5</div>
    </div>
  </body>
</html>
